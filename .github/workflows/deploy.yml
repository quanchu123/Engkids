name: Deploy to DigitalOcean

# Tự chạy mỗi khi push lên nhánh master (hoặc bấm chạy tay trong tab Actions)
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current commit
        uses: actions/checkout@v4

      - name: Package source
        run: |
          git archive --format=tar.gz --output=engkids-source.tgz HEAD

      - name: Copy source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: engkids-source.tgz
          target: /tmp

      - name: SSH vào server và deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          PAYOS_CLIENT_ID: ${{ secrets.PAYOS_CLIENT_ID }}
          PAYOS_API_KEY: ${{ secrets.PAYOS_API_KEY }}
          PAYOS_CHECKSUM_KEY: ${{ secrets.PAYOS_CHECKSUM_KEY }}
          NEXT_PUBLIC_SITE_URL: https://engkidstienganhchobe.tech
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: PAYOS_CLIENT_ID,PAYOS_API_KEY,PAYOS_CHECKSUM_KEY,NEXT_PUBLIC_SITE_URL,DEPLOY_SHA
          script: |
            mkdir -p /root/Engkids
            tar -xzf /tmp/engkids-source.tgz -C /root/Engkids
            cd /root/Engkids
            echo "${DEPLOY_SHA}" > public/deploy-commit.txt
            node <<'NODE'
            const fs = require('fs');
            const envPath = '.env.local';
            let content = fs.existsSync(envPath) ? fs.readFileSync(envPath, 'utf8') : '';
            for (const key of ['PAYOS_CLIENT_ID', 'PAYOS_API_KEY', 'PAYOS_CHECKSUM_KEY', 'NEXT_PUBLIC_SITE_URL']) {
              const value = process.env[key];
              if (!value) throw new Error(`${key} is missing from GitHub Actions secrets`);
              const line = `${key}=${value}`;
              const pattern = new RegExp(`^${key}=.*$`, 'm');
              content = pattern.test(content)
                ? content.replace(pattern, line)
                : `${content.trimEnd()}\n${line}\n`;
            }
            fs.writeFileSync(envPath, content);
            NODE
            rm -rf .next
            npm install
            if grep -Eq '^(SUPABASE_DB_URL|DATABASE_URL)=' .env.local; then
              npm run db:push:supabase
            else
              echo "Skipping Supabase DB push: SUPABASE_DB_URL/DATABASE_URL is not set in .env.local"
            fi
            npm run build
            pm2 delete engkids || true
            pm2 start npm --name engkids -- start
            sleep 5
            served_commit="$(curl -fsS http://127.0.0.1:3000/deploy-commit.txt || true)"
            echo "Served commit: ${served_commit}"
            test "${served_commit}" = "${DEPLOY_SHA}"
            pm2 save
