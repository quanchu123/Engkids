# ============================================
# DigitalOcean App Platform spec for Engkids
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Usage:
#   1. Push this repo to GitHub.
#   2. In DigitalOcean -> Apps -> Create App -> pick this repo.
#   3. DO auto-detects the Dockerfile. Set the secret env vars below in the UI
#      (or via `doctl apps create --spec .do/app.yaml`).
# ============================================
name: engkids
region: sgp # Singapore - closest region to Vietnam for low latency

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: quanchu123/Engkids
      branch: master
      deploy_on_push: true

    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xxs # bump to basic-xs/s for more traffic

    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 15

    # ---- Public (client) build-time vars: baked into the bundle ----
    envs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: BUILD_AND_RUN_TIME
        value: ${NEXT_PUBLIC_SUPABASE_URL}
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: BUILD_AND_RUN_TIME
        value: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - key: NEXT_PUBLIC_APP_URL
        scope: BUILD_AND_RUN_TIME
        value: https://engkidstienganhchobe.me

      # ---- Server-side secrets: set type=SECRET in the DO dashboard ----
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ADMIN_EMAILS
        scope: RUN_TIME
        type: SECRET
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        value: https://engkidstienganhchobe.me,https://www.engkidstienganhchobe.me
      - key: UPLOADS_DIR
        scope: RUN_TIME
        value: /app/public/uploads
